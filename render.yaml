databases:
  - name: shopora-db
    plan: free
    databaseName: ecommerce
    user: ecommerce

services:
  - type: web
    name: shopora-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shopora-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://shopora-frontend.onrender.com"]'
      - key: FRONTEND_URL
        value: https://shopora-frontend.onrender.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USE_TLS
        value: "true"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        value: noreply@shopora.local
      - key: SMTP_FROM_NAME
        value: Shopora

  - type: web
    name: shopora-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://shopora-backend.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
